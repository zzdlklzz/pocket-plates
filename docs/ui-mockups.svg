<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1050" viewBox="0 0 1500 1050" role="img" aria-labelledby="title desc">
  <title id="title">Meal Prep Recipe PWA UI Mockups</title>
  <desc id="desc">Four mobile UI mockups showing recipe library, recipe detail, add edit recipe, and filters sheet.</desc>
  <defs>
    <style>
      .bg { fill: #f8faf7; }
      .phone { fill: #141a1f; rx: 36; }
      .screen { fill: #fffdf8; rx: 28; }
      .top { fill: #eaf2ec; }
      .card { fill: #ffffff; stroke: #d9dfd8; stroke-width: 1.5; rx: 8; }
      .chip { fill: #ecf3ef; stroke: #cbd9d0; stroke-width: 1; rx: 14; }
      .active { fill: #2f6f55; rx: 14; }
      .image { fill: #dfe9e1; rx: 8; }
      .image2 { fill: #f5dfc4; rx: 8; }
      .image3 { fill: #d7e7f7; rx: 8; }
      .image4 { fill: #eadcf5; rx: 8; }
      .line { stroke: #d8ddd8; stroke-width: 1.4; }
      .title { font: 700 30px Arial, sans-serif; fill: #263238; }
      .label { font: 700 18px Arial, sans-serif; fill: #263238; }
      .text { font: 500 14px Arial, sans-serif; fill: #37474f; }
      .muted { font: 500 12px Arial, sans-serif; fill: #697a80; }
      .white { font: 700 12px Arial, sans-serif; fill: #ffffff; }
      .button { fill: #2f6f55; rx: 8; }
      .field { fill: #ffffff; stroke: #cfd8d3; stroke-width: 1.4; rx: 8; }
      .nav { fill: #f1f5f2; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="1050"/>
  <text class="title" x="56" y="58">Meal Prep Recipe PWA - Main Mobile UI Mockups</text>

  <!-- Phone 1: Home -->
  <rect class="phone" x="60" y="100" width="310" height="820"/>
  <rect class="screen" x="76" y="116" width="278" height="788"/>
  <rect class="top" x="76" y="116" width="278" height="118" rx="28"/>
  <text class="label" x="100" y="162">Meal Prep</text>
  <rect class="field" x="100" y="178" width="230" height="36"/>
  <text class="muted" x="116" y="201">Search recipes...</text>
  <rect class="active" x="100" y="254" width="46" height="28"/><text class="white" x="114" y="273">All</text>
  <rect class="chip" x="154" y="254" width="58" height="28"/><text class="muted" x="166" y="273">Bfast</text>
  <rect class="chip" x="220" y="254" width="58" height="28"/><text class="muted" x="234" y="273">Lunch</text>
  <rect class="chip" x="286" y="254" width="44" height="28"/><text class="muted" x="298" y="273">Fast</text>
  <rect class="card" x="100" y="306" width="104" height="150"/>
  <rect class="image" x="112" y="318" width="80" height="72"/>
  <text class="text" x="112" y="414">Chicken</text><text class="muted" x="112" y="434">4 serv</text>
  <rect class="card" x="226" y="306" width="104" height="150"/>
  <rect class="image2" x="238" y="318" width="80" height="72"/>
  <text class="text" x="238" y="414">Pasta</text><text class="muted" x="238" y="434">2 serv</text>
  <rect class="card" x="100" y="480" width="104" height="150"/>
  <rect class="image3" x="112" y="492" width="80" height="72"/>
  <text class="text" x="112" y="588">Oats</text><text class="muted" x="112" y="608">1 serv</text>
  <rect class="card" x="226" y="480" width="104" height="150"/>
  <rect class="image4" x="238" y="492" width="80" height="72"/>
  <text class="text" x="238" y="588">Curry</text><text class="muted" x="238" y="608">5 serv</text>
  <rect class="nav" x="76" y="828" width="278" height="76"/>
  <text class="muted" x="114" y="872">Home</text><text class="label" x="207" y="872">+</text><text class="muted" x="272" y="872">Filters</text>
  <text class="label" x="120" y="956">Home / Library</text>

  <!-- Phone 2: Detail -->
  <rect class="phone" x="420" y="100" width="310" height="820"/>
  <rect class="screen" x="436" y="116" width="278" height="788"/>
  <text class="label" x="460" y="162">&lt; Chicken Rice</text><text class="label" x="668" y="162">...</text>
  <rect class="image" x="460" y="190" width="230" height="160"/>
  <text class="label" x="460" y="386">Chicken Rice</text>
  <text class="muted" x="460" y="410">Dinner · 4 servings</text>
  <rect class="chip" x="460" y="428" width="48" height="24"/><text class="muted" x="474" y="445">rice</text>
  <rect class="chip" x="516" y="428" width="62" height="24"/><text class="muted" x="528" y="445">budget</text>
  <line class="line" x1="460" y1="476" x2="690" y2="476"/>
  <text class="label" x="460" y="510">Source Links</text>
  <text class="text" x="460" y="538">TikTok recipe link</text>
  <text class="text" x="460" y="564">Instagram reel link</text>
  <line class="line" x1="460" y1="590" x2="690" y2="590"/>
  <text class="label" x="460" y="624">Ingredients</text>
  <text class="text" x="460" y="652">- Chicken thigh - 500g</text>
  <text class="text" x="460" y="678">- Rice - 2 cups</text>
  <text class="text" x="460" y="704">- Soy sauce - 2 tbsp</text>
  <line class="line" x1="460" y1="730" x2="690" y2="730"/>
  <text class="label" x="460" y="764">Steps</text>
  <text class="text" x="460" y="792">1. Wash and cook rice</text>
  <text class="text" x="460" y="818">2. Marinate chicken</text>
  <rect class="button" x="460" y="844" width="230" height="42"/><text class="white" x="545" y="870">Edit Recipe</text>
  <text class="label" x="496" y="956">Recipe Detail</text>

  <!-- Phone 3: Add/Edit -->
  <rect class="phone" x="780" y="100" width="310" height="820"/>
  <rect class="screen" x="796" y="116" width="278" height="788"/>
  <text class="text" x="820" y="160">Cancel</text><text class="text" x="1048" y="160">Save</text>
  <text class="muted" x="820" y="206">Recipe name</text>
  <rect class="field" x="820" y="218" width="230" height="38"/>
  <text class="muted" x="820" y="288">Servings</text>
  <rect class="field" x="820" y="300" width="88" height="36"/><text class="text" x="836" y="323">- 4 +</text>
  <text class="muted" x="820" y="370">Meal type</text>
  <rect class="active" x="820" y="384" width="62" height="30"/><text class="white" x="832" y="404">Lunch</text>
  <rect class="chip" x="890" y="384" width="68" height="30"/><text class="muted" x="902" y="404">Dinner</text>
  <rect class="chip" x="966" y="384" width="62" height="30"/><text class="muted" x="978" y="404">Snack</text>
  <text class="muted" x="820" y="454">Image</text>
  <rect class="field" x="820" y="466" width="104" height="36"/><text class="text" x="842" y="489">Upload</text>
  <rect class="field" x="936" y="466" width="114" height="36"/><text class="text" x="958" y="489">Paste URL</text>
  <text class="muted" x="820" y="540">Source links</text>
  <rect class="field" x="820" y="552" width="230" height="36"/><text class="muted" x="836" y="575">URL</text>
  <text class="text" x="820" y="618">+ Add link</text>
  <text class="muted" x="820" y="660">Ingredients</text>
  <rect class="field" x="820" y="672" width="230" height="36"/><text class="muted" x="836" y="695">Name | Amount | Unit</text>
  <text class="text" x="820" y="738">+ Add ingredient</text>
  <text class="muted" x="820" y="780">Steps</text>
  <rect class="field" x="820" y="792" width="230" height="36"/><text class="muted" x="836" y="815">1. Instruction</text>
  <text class="text" x="820" y="858">+ Add step</text>
  <text class="label" x="842" y="956">Add / Edit Recipe</text>

  <!-- Phone 4: Filters -->
  <rect class="phone" x="1140" y="100" width="310" height="820"/>
  <rect class="screen" x="1156" y="116" width="278" height="788"/>
  <text class="label" x="1180" y="162">Filters</text><text class="text" x="1376" y="162">Done</text>
  <line class="line" x1="1180" y1="190" x2="1410" y2="190"/>
  <text class="label" x="1180" y="232">Meal type</text>
  <text class="text" x="1180" y="268">○ Any</text>
  <text class="text" x="1180" y="302">○ Breakfast</text>
  <text class="text" x="1180" y="336">○ Lunch</text>
  <text class="text" x="1180" y="370">○ Dinner</text>
  <line class="line" x1="1180" y1="404" x2="1410" y2="404"/>
  <text class="label" x="1180" y="446">Tags</text>
  <text class="text" x="1180" y="482">□ Budget</text>
  <text class="text" x="1180" y="516">□ Quick</text>
  <text class="text" x="1180" y="550">□ High protein</text>
  <text class="text" x="1180" y="584">□ Freezer-friendly</text>
  <line class="line" x1="1180" y1="620" x2="1410" y2="620"/>
  <text class="label" x="1180" y="662">Ingredients</text>
  <rect class="field" x="1180" y="678" width="230" height="38"/>
  <text class="muted" x="1196" y="702">chicken</text>
  <text class="text" x="1180" y="770">Clear filters</text>
  <text class="label" x="1216" y="956">Filters Sheet</text>
</svg>

