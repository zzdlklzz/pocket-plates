<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Meal Prep Recipe PWA Architecture</title>
  <desc id="desc">High level system architecture showing iPhone PWA, Vercel hosted Next.js app, Supabase client, auth, database, storage, and data tables.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#37515f"/>
    </marker>
    <style>
      .bg { fill: #f8faf7; }
      .band { fill: #eef5f0; stroke: #d5e2d8; stroke-width: 2; }
      .card { fill: #ffffff; stroke: #bfd0c6; stroke-width: 2; rx: 8; }
      .service { fill: #e8f3ff; stroke: #abc5dd; stroke-width: 2; rx: 8; }
      .data { fill: #fff7e8; stroke: #dec99f; stroke-width: 2; rx: 8; }
      .asset { fill: #f3ecff; stroke: #c8b4e5; stroke-width: 2; rx: 8; }
      .label { font: 600 24px Arial, sans-serif; fill: #263238; }
      .small { font: 500 17px Arial, sans-serif; fill: #33434a; }
      .tiny { font: 500 15px Arial, sans-serif; fill: #53636b; }
      .line { stroke: #37515f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #78909c; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1280" height="860"/>
  <text class="label" x="64" y="64">Meal Prep Recipe PWA - High Level Architecture</text>
  <text class="tiny" x="64" y="92">Mobile-first private recipe app hosted free/cheap, with cloud sync and iPhone Home Screen usage.</text>

  <rect class="band" x="48" y="130" width="280" height="610" rx="12"/>
  <text class="small" x="78" y="170">Device Layer</text>
  <rect class="card" x="78" y="210" width="220" height="110"/>
  <text class="small" x="108" y="252">iPhone</text>
  <text class="tiny" x="108" y="278">Home Screen PWA</text>
  <rect class="card" x="78" y="370" width="220" height="110"/>
  <text class="small" x="108" y="412">Safari</text>
  <text class="tiny" x="108" y="438">Add to Home Screen</text>

  <rect class="band" x="390" y="130" width="300" height="610" rx="12"/>
  <text class="small" x="420" y="170">Frontend Layer</text>
  <rect class="service" x="420" y="210" width="240" height="110"/>
  <text class="small" x="450" y="250">Vercel Hosting</text>
  <text class="tiny" x="450" y="276">Deploys Next.js app</text>
  <rect class="card" x="420" y="370" width="240" height="120"/>
  <text class="small" x="450" y="412">Next.js Mobile UI</text>
  <text class="tiny" x="450" y="438">Recipe screens, forms,</text>
  <text class="tiny" x="450" y="462">filters, PWA metadata</text>
  <rect class="card" x="420" y="550" width="240" height="110"/>
  <text class="small" x="450" y="592">Supabase Client</text>
  <text class="tiny" x="450" y="618">Reads and writes data</text>

  <rect class="band" x="750" y="130" width="480" height="610" rx="12"/>
  <text class="small" x="780" y="170">Supabase Layer</text>
  <rect class="service" x="780" y="210" width="180" height="100"/>
  <text class="small" x="808" y="252">Auth</text>
  <text class="tiny" x="808" y="278">Private sign-in</text>
  <rect class="service" x="1000" y="210" width="180" height="100"/>
  <text class="small" x="1028" y="252">Storage</text>
  <text class="tiny" x="1028" y="278">Recipe photos</text>
  <rect class="service" x="780" y="370" width="400" height="110"/>
  <text class="small" x="808" y="412">Postgres Database</text>
  <text class="tiny" x="808" y="438">Recipes protected by Row Level Security</text>

  <rect class="data" x="780" y="540" width="116" height="72"/>
  <text class="tiny" x="806" y="582">Recipes</text>
  <rect class="data" x="914" y="540" width="116" height="72"/>
  <text class="tiny" x="934" y="582">Ingredients</text>
  <rect class="data" x="1048" y="540" width="116" height="72"/>
  <text class="tiny" x="1082" y="582">Steps</text>
  <rect class="data" x="780" y="642" width="176" height="72"/>
  <text class="tiny" x="812" y="684">Source Links</text>
  <rect class="data" x="988" y="642" width="176" height="72"/>
  <text class="tiny" x="1028" y="684">Tags / Meals</text>

  <rect class="asset" x="420" y="770" width="240" height="54"/>
  <text class="tiny" x="450" y="803">GitHub repo triggers deploy later</text>

  <path class="line" d="M298 265 C350 265, 360 265, 420 265"/>
  <path class="line" d="M540 320 L540 370"/>
  <path class="line" d="M540 490 L540 550"/>
  <path class="line" d="M660 604 C700 604, 720 260, 780 260"/>
  <path class="line" d="M660 604 C720 604, 720 425, 780 425"/>
  <path class="line" d="M660 604 C730 604, 920 260, 1000 260"/>
  <path class="dash" d="M540 770 L540 660"/>
  <path class="line" d="M980 480 L838 540"/>
  <path class="line" d="M980 480 L972 540"/>
  <path class="line" d="M980 480 L1106 540"/>
  <path class="line" d="M980 480 L868 642"/>
  <path class="line" d="M980 480 L1076 642"/>
</svg>

