name: Deploy Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - uses: supabase/setup-cli@v3
        with:
          version: 2.109.1
      - name: Check Supabase deployment secrets
        run: |
          missing=0

          for name in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub secret::$name is required for Supabase migration deployment."
              missing=1
            fi
          done

          exit "$missing"
      - run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - run: supabase migration list --linked
      - run: supabase db push
      - run: supabase migration list --linked
